    <span class="hljs-keyword">var</span> key = CreateKey(computer, input);
    <span class="hljs-keyword">if</span> (TryGetCached(key, <span class="hljs-keyword">out</span> <span class="hljs-keyword">var</span> output)) <span class="hljs-keyword">return</span> output;
    <span class="hljs-keyword">lock</span> (GetLock(key)) { <span class="hljs-comment">// Double-check locking</span>

      StoreCached(key, output);
      <span class="hljs-keyword">return</span> output;

<h1>План Б: зависимости + инвалидация</h1>
<pre><code class="language-cs"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-function">Func&lt;TIn, TOut&gt; <span class="hljs-title">ToAwesome</span>(<span class="hljs-params">Func&lt;TIn, TOut&gt; computer</span>)</span>
  =&gt; input =&gt; {
    <span class="hljs-keyword">var</span> key = CreateKey(computer, input);
    <span class="hljs-keyword">if</span> (TryGetCached(key, <span class="hljs-keyword">out</span> <span class="hljs-keyword">var</span> computed) || Computed.IsInvalidating) 
      <span class="hljs-keyword">return</span> computed.Use(Computed.IsInvalidating);
    <span class="hljs-keyword">lock</span> (GetLock(key)) { 
      <span class="hljs-keyword">if</span> (TryGetCached(key, <span class="hljs-keyword">out</span> <span class="hljs-keyword">var</span> computed)) 
        <span class="hljs-keyword">return</span> computed.Use();
      
      <span class="hljs-keyword">var</span> oldCurrent = Computed.Current;
      Computed.Current = computed = <span class="hljs-keyword">new</span> Computed(computer, input);
      <span class="hljs-keyword">try</span> {
        computed.Value = computer(input);
      }
      catch (Exception error) {
        computed.Error = error;
      }
      <span class="hljs-keyword">finally</span> {
        Computed.Current = oldCurrent;
      }
      
      StoreCached(key, computed);
      <span class="hljs-keyword">return</span> computed.Use();
    }
  }
</span></span></foreignObject></svg></code></pre>
</section>

<h1>Computed.Use()</h1>
<pre><code class="language-cs"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-function"><span class="hljs-keyword">static</span> TOut <span class="hljs-title">Use</span>&lt;<span class="hljs-title">TIn</span>, <span class="hljs-title">TOut</span>&gt;(<span class="hljs-params">
    <span class="hljs-keyword">this</span> Computed&lt;TIn, TOut&gt;? computed, 
    <span class="hljs-built_in">bool</span> isInvalidating = <span class="hljs-literal">false</span></span>)</span> 
{

<pre><code class="language-cs"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-keyword">void</span> Computed.Invalidate() 
{

  <span class="hljs-keyword">lock</span> (<span class="hljs-keyword">this</span>) {
    <span class="hljs-keyword">if</span> (State == State.Invalidated) <span class="hljs-keyword">return</span>;

<h1>Blazor - минусы:</h1>
<ul>
<li>Пока нет JIT / AOT - все исполняется в режиме интерпретации</li>
<li>Даже небольшие проекты загружают кучу сборок.<br />
Есть tree shaking, но даже с ним остается 2-4 МБ сборок .NET.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h1>Blazor - плюсы:</h1>
<ul>
<li>Это .NET, т.е. масса готового + не нужен JavaScript, TypeScript, ...</li>
<li>Есть Blazor Server: UI работает на стороне сервера, на клиент идут diff-ы, которые применяются там к DOM.</li>
<li>AOT и threads обещают в ближ. год. В JS threads не видать, а ядер - все больше, потому догнать и перегнать JS вполне возможно даже без JIT.</li>
<li>Есть <a href="https://docs.microsoft.com/en-us/mobile-blazor-bindings/">Blazor Mobile</a> - это React Native на .NET и без WASM. Пока experimental.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">

<pre><code class="language-cs"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-function"><span class="hljs-keyword">protected</span> <span class="hljs-keyword">override</span> <span class="hljs-keyword">void</span> <span class="hljs-title">BuildRenderTree</span>(<span class="hljs-params">RenderTreeBuilder __builder</span>)</span>
{
  __builder.OpenElement(<span class="hljs-number">0</span>, <span class="hljs-string">&quot;div&quot;</span>);
  __builder.AddAttribute(<span class="hljs-number">1</span>, <span class="hljs-string">&quot;class&quot;</span>, <span class="hljs-keyword">this</span>.CssClass);
  __builder.AddMultipleAttributes(<span class="hljs-number">2</span>,

</span></span></foreignObject></svg></code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h1>Blazor - функциональный вариант</h1>
<pre><code class="language-cs"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-function"><span class="hljs-keyword">protected</span> <span class="hljs-keyword">override</span> HashSet&lt;Component&gt; <span class="hljs-title">RenderChildren</span>(<span class="hljs-params"></span>)</span>
{
  <span class="hljs-keyword">var</span> div = Element(<span class="hljs-keyword">this</span>, <span class="hljs-number">0</span>, <span class="hljs-string">&quot;div&quot;</span>) <span class="hljs-comment">// parent, key, type</span>
    .SetAttributes(<span class="hljs-string">&quot;class&quot;</span>, CssClass)
    .SetAttributes(Attributes)); 
  <span class="hljs-keyword">var</span> icon = Component&lt;Icon&gt;(div, <span class="hljs-number">7</span>) <span class="hljs-comment">// parent, key</span>
    .SetAttributes(<span class="hljs-string">&quot;CssClass&quot;</span>, IconCssClass));
  <span class="hljs-comment">// ...</span>
  <span class="hljs-keyword">return</span> <span class="hljs-keyword">new</span> <span class="hljs-keyword">new</span> HashSet&lt;Component&gt;() { div, icon, ... };
}

<span class="hljs-function"><span class="hljs-keyword">protected</span> <span class="hljs-keyword">void</span> <span class="hljs-title">Render</span>(<span class="hljs-params"></span>)</span>
{
  <span class="hljs-keyword">var</span> newChildren = RenderChildren();
  <span class="hljs-keyword">foreach</span> (<span class="hljs-keyword">var</span> c <span class="hljs-keyword">in</span> Children.ToHashSet().ExceptWith(newChildren))
      c.Dispose();
  <span class="hljs-keyword">foreach</span> (<span class="hljs-keyword">var</span> c <span class="hljs-keyword">in</span> newChildren)
      c.TryRender();
}

</span></span></foreignObject></svg></code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h1>Blazor и React - так что же у нас общее?</h1>
<ul>
<li>Virtual DOM = такой же кэш для результатов <code>Component&lt;T&gt;(...)</code> &amp; <code>Element(...)</code></li>
<li>Сache miss для <code>Component&lt;T&gt;(...)</code> так же приводит к его созданию</li>
<li><code>TryRender()</code> вызывает <code>Render()</code> для всего, что изменилось с<br />
последнего <code>Render</code>.</li>
</ul>
<h2>Это инкрементальный билд UI с генерацией diff-a к реальному DOM во время рендеринга.</h2>

    ConsistencyState ConsistencyState { <span class="hljs-keyword">get</span>; }

<h1><code>ComposerService</code> - пример сервиса-агрегатора</h1>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h1>Насколько эффективно кэширование Fusion?</h1>
<p>Метод, который мы будем вызывать в тесте:</p>
<pre><code class="language-cs"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-keyword">public</span> <span class="hljs-keyword">virtual</span> <span class="hljs-keyword">async</span> Task&lt;User?&gt; TryGetAsync(<span class="hljs-built_in">long</span> userId)
{
  <span class="hljs-keyword">await</span> Everything(); <span class="hljs-comment">// Кто уже понял, чем этот вызов полезен?</span>
  <span class="hljs-keyword">await</span> <span class="hljs-keyword">using</span> <span class="hljs-keyword">var</span> dbContext = DbContextFactory.CreateDbContext();
  <span class="hljs-comment">// DbContextFactory зарегистрирована с AddPooledDbContextFactory</span>
  <span class="hljs-keyword">var</span> user = <span class="hljs-keyword">await</span> dbContext.Users.FindAsync(<span class="hljs-keyword">new</span>[] {(<span class="hljs-built_in">object</span>) userId});
  <span class="hljs-keyword">return</span> user;
}
</span></span></foreignObject></svg></code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h1>Насколько эффективно кэширование Fusion?</h1>
<p>Читалка - их в тесте 3 на ядро:</p>
<pre><code class="language-cs"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-function"><span class="hljs-keyword">async</span> Task&lt;<span class="hljs-built_in">long</span>&gt; <span class="hljs-title">Reader</span>(<span class="hljs-params"><span class="hljs-built_in">string</span> name, <span class="hljs-built_in">int</span> iterationCount</span>)</span>
{
    <span class="hljs-comment">// IUserProvider users захватывается замыканием</span>
    <span class="hljs-keyword">var</span> rnd = <span class="hljs-keyword">new</span> Random();
    <span class="hljs-keyword">var</span> count = <span class="hljs-number">0L</span>;
    <span class="hljs-keyword">for</span> (; iterationCount &gt; <span class="hljs-number">0</span>; iterationCount--) {
        <span class="hljs-keyword">var</span> userId = (<span class="hljs-built_in">long</span>) rnd.Next(UserCount);
        <span class="hljs-keyword">var</span> user = <span class="hljs-keyword">await</span> users.TryGetAsync(userId);
        <span class="hljs-keyword">if</span> (user!.Id == userId)
            count++;
        extraAction.Invoke(user!); <span class="hljs-comment">// + Сериализация</span>
    }
    <span class="hljs-keyword">return</span> count;
}
</span></span></foreignObject></svg></code></pre>
<p>Еще есть похожий <code>Mutator</code>, его выполняет один поток.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h1>Насколько эффективно кэширование Fusion?</h1>

<div class="col2" style="margin-top: 0px;">

<div class="break"></div>

Without Stl.Fusion:

</div>
<p>In-memory EF provider: <strong>1140x</strong></p>
<div class="col2" style="margin-top: 0px;">
<pre>
With Stl.Fusion:
  Standard test:
    Speed:      30338.256 K Ops/sec

</pre>

<pre>

<p>И это только первый уровень, т.е. нет никакого incremental build!</p>

<h2>Что дает Fusion?</h2>
<p>Чувство полета:</p>
<ul>
<li>Кэширование с каскадной инвалидацией</li>
<li>Гарантию отсутствия™ бессмысленных конкурентных вычислений</li>
<li>Внезапно: все <code>[ComputeMethod]</code>-ы можно выполнять параллельно!</li>
</ul>
<p>Чувство офигения:</p>
<ul>
<li>Клиенты сервисов Fusion, кэширующие все локально -<br />
с цепочками инвалидации, которые тянутся до них с сервера!</li>
</ul>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section class="invert" style="" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;--marpit-advanced-background-split:45%;" data-marpit-advanced-background="background" data-marpit-advanced-background-split="right"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;./img/LazyCat.jpg&quot;);"></figure></div></section></foreignObject><foreignObject width="55%" height="720"><section id="60" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;--marpit-advanced-background-split:45%;" data-marpit-advanced-background="content" data-marpit-advanced-background-split="right">
<h2>Что дает Fusion?</h2>
<p>И все это - с минимальными изменениями в коде.</p>
<blockquote>
<p>Просто добавь <code>Computed.Invalidate(...)</code>!<br />
– Александр Якунин, автор Fusion</p>
</blockquote>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section class="invert" style="" data-marpit-advanced-background="pseudo"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h2>Что дает Fusion?</h2>
<p>Более того, Blazor позволяет запускать сервисы Fusion и на клиенте, где они обычно &quot;подключаются&quot; к репликам сервисов вместо настоящих серверных сервисов.</p>
<p>А значит:</p>
<ul>
<li>Все еще ищете аналог MobX / Knockout.js для Blazor? С Fusion он не нужен.</li>
<li>Ваш клиентский код, строящий клиентские модели, теперь может так же работать везде - именно это и позволяет приложениям на Fusion работать как в Blazor Server, так и в Blazor WASM режимах.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-class="invert" data-theme="default" class="invert" style="--class:invert;--theme:default;">
<h2>Какие ваши trade-offs?</h2>
<ul>
<li><strong>Деньги:</strong> гусары денег не берут (MIT license)</li>
<li><strong>CPU:</strong> мы освободим ваши CPU, избавив их от вычисления одной и той же фигни по тысяче раз!</li>
<li><strong>RAM:</strong> это наше все, но <a href="https://github.com/servicetitan/Stl.Fusion.Samples/blob/master/docs/tutorial/Part08.md#large-working-sets-and-gc-pauses">помните про GC pauses</a> и другие минусы локального кэширования. Впрочем, плюсов больше + есть swapping - Fusion-версия кэширования извне.</li>
<li><strong>Время на изучение:</strong> все не так просто, как в этой презентации, конечно, но если сравнить с TPL и особенностями async-await на .NET, например - Fusion несколько проще.</li>
<li><strong>Другие риски:</strong> продукту целых 8 месяцев с момента написания первых строчек кода, какие тут могут быть риски?</li>
</ul>
<footer>Слайд сделан под давлением!</footer>
</section>
