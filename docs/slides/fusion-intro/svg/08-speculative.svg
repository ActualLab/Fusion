<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 270" font-family="Inter, ui-sans-serif, sans-serif">
  <defs>
    <marker id="aSpec" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#7e7e87"/>
    </marker>
    <marker id="aSaved" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,-5L10,0L0,5" fill="#7ee787"/>
    </marker>
  </defs>

  <!-- latency-saved annotation -->
  <text x="490" y="18" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="600">latency saved</text>
  <line x1="340" y1="30" x2="640" y2="30" stroke="#7ee787" stroke-width="1.6"
        marker-start="url(#aSaved)" marker-end="url(#aSaved)"/>
  <line x1="640" y1="34" x2="640" y2="47" stroke="#7ee787" stroke-width="1" opacity="0.45" stroke-dasharray="4 4"/>
  <line x1="340" y1="34" x2="340" y2="126" stroke="#7ee787" stroke-width="1" opacity="0.45" stroke-dasharray="4 4"/>

  <!-- row labels -->
  <text x="18" y="71" fill="#7e7e87" font-size="14" font-weight="600">Normal</text>
  <text x="18" y="170" fill="#bd34fe" font-size="14" font-weight="600">Speculative</text>

  <!-- Normal row -->
  <rect x="130" y="47" width="300" height="38" rx="7" fill="rgba(126,126,135,0.14)"
        stroke="#7e7e87" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="280" y="71" text-anchor="middle" fill="#9ca0ad" font-size="13">wait for the input</text>

  <rect x="430" y="47" width="210" height="38" rx="7" fill="rgba(189,52,254,0.13)" stroke="#bd34fe" stroke-width="1.6"/>
  <text x="535" y="71" text-anchor="middle" fill="#fcfcf7" font-size="13">do the work</text>

  <line x1="641" y1="66" x2="660" y2="66" stroke="#7e7e87" stroke-width="1.6" marker-end="url(#aSpec)"/>
  <rect x="662" y="50" width="84" height="32" rx="16" fill="rgba(168,177,255,0.16)" stroke="#a8b1ff" stroke-width="1.4"/>
  <text x="704" y="70" text-anchor="middle" fill="#fcfcf7" font-size="12.5">result</text>

  <!-- Speculative: work on a guess -->
  <rect x="130" y="126" width="210" height="38" rx="7" fill="rgba(189,52,254,0.13)" stroke="#bd34fe" stroke-width="1.6"/>
  <text x="235" y="150" text-anchor="middle" fill="#fcfcf7" font-size="12.5">do the work on a guess</text>

  <line x1="341" y1="145" x2="360" y2="145" stroke="#7e7e87" stroke-width="1.6" marker-end="url(#aSpec)"/>
  <rect x="362" y="129" width="84" height="32" rx="16" fill="rgba(168,177,255,0.16)" stroke="#a8b1ff" stroke-width="1.4"/>
  <text x="404" y="149" text-anchor="middle" fill="#fcfcf7" font-size="12.5">result</text>

  <!-- Speculative: verify -->
  <rect x="130" y="174" width="300" height="32" rx="7" fill="rgba(65,209,255,0.10)" stroke="#41d1ff" stroke-width="1.4"/>
  <text x="280" y="194" text-anchor="middle" fill="#bfe6ff" font-size="12">verify it — in parallel</text>

  <text x="454" y="187" fill="#7ee787" font-size="12.5">✓  guess right → keep the result</text>
  <text x="454" y="204" fill="#ff7b72" font-size="12.5">✗  guess wrong → discard, redo</text>

  <!-- time axis -->
  <line x1="130" y1="240" x2="770" y2="240" stroke="#7e7e87" stroke-width="1" marker-end="url(#aSpec)"/>
  <text x="748" y="257" fill="#7e7e87" font-size="11">time</text>
</svg>
