<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 34 800 264" font-family="Inter, ui-sans-serif, sans-serif">
  <defs>
    <marker id="a18" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#a8b1ff"/>
    </marker>
    <marker id="a18r" viewBox="0 -5 10 10" refX="9" refY="0" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#f44"/>
    </marker>
  </defs>

  <!-- lifelines -->
  <line x1="98" y1="66" x2="784" y2="66" stroke="#5a5a63" stroke-width="1"/>
  <line x1="98" y1="176" x2="784" y2="176" stroke="#5a5a63" stroke-width="1"/>

  <!-- actor boxes -->
  <rect x="12" y="52" width="86" height="28" rx="6" fill="rgba(168,177,255,0.10)" stroke="#a8b1ff" stroke-width="1.4"/>
  <text x="55" y="71" text-anchor="middle" fill="#fcfcf7" font-size="13">Client</text>
  <rect x="12" y="162" width="86" height="28" rx="6" fill="rgba(189,52,254,0.10)" stroke="#bd34fe" stroke-width="1.4"/>
  <text x="55" y="181" text-anchor="middle" fill="#fcfcf7" font-size="13">Server</text>

  <!-- state-change guides -->
  <line x1="205" y1="66" x2="205" y2="226" stroke="#7e7e87" stroke-width="1" opacity="0.35" stroke-dasharray="4 4"/>
  <line x1="391" y1="66" x2="391" y2="226" stroke="#7e7e87" stroke-width="1" opacity="0.35" stroke-dasharray="4 4"/>
  <line x1="621" y1="66" x2="621" y2="226" stroke="#7e7e87" stroke-width="1" opacity="0.35" stroke-dasharray="4 4"/>

  <!-- RPC-eliminated callout (consistent window) -->
  <rect x="399" y="92" width="206" height="42" rx="8" fill="rgba(74,222,128,0.10)" stroke="#4ade80" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="502" y="112" text-anchor="middle" fill="#7ee787" font-size="13" font-weight="600">RPC eliminated</text>
  <text x="502" y="128" text-anchor="middle" fill="#8ef0a4" font-size="11">repeat calls → cache hits</text>

  <!-- leg 1: call -->
  <line x1="205" y1="66" x2="228" y2="176" stroke="#a8b1ff" stroke-width="2" marker-end="url(#a18)"/>
  <text x="196" y="50" text-anchor="middle" fill="#a8b1ff" font-size="12.5">① call</text>

  <!-- server compute -->
  <rect x="228" y="164" width="140" height="24" rx="5" fill="rgba(250,204,21,0.14)" stroke="#facc15" stroke-width="1.4"/>
  <text x="298" y="180" text-anchor="middle" fill="#fcfcf7" font-size="11.5">server computes</text>

  <!-- leg 2: result -->
  <line x1="368" y1="176" x2="391" y2="66" stroke="#a8b1ff" stroke-width="2" marker-end="url(#a18)"/>
  <text x="400" y="50" text-anchor="middle" fill="#a8b1ff" font-size="12.5">② result</text>

  <!-- leg 3: invalidation (later, async) -->
  <text x="598" y="208" text-anchor="middle" fill="#7e7e87" font-size="11">underlying data changes</text>
  <line x1="598" y1="176" x2="621" y2="66" stroke="#f44" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#a18r)"/>
  <text x="628" y="50" text-anchor="start" fill="#f44" font-size="12.5">③ invalidation</text>

  <!-- consistency-state track -->
  <rect x="98"  y="228" width="107" height="34" fill="rgba(255,68,68,0.13)"  stroke="#f44"    stroke-width="1"/>
  <text x="151" y="249" text-anchor="middle" fill="#ff9a9a" font-size="11.5">inconsistent</text>
  <rect x="205" y="228" width="186" height="34" fill="rgba(250,204,21,0.13)" stroke="#facc15" stroke-width="1"/>
  <text x="298" y="249" text-anchor="middle" fill="#f2d56b" font-size="11.5">computing</text>
  <rect x="391" y="228" width="230" height="34" fill="rgba(74,222,128,0.13)" stroke="#4ade80" stroke-width="1"/>
  <text x="506" y="249" text-anchor="middle" fill="#8ef0a4" font-size="11.5">consistent</text>
  <rect x="621" y="228" width="163" height="34" fill="rgba(255,68,68,0.13)"  stroke="#f44"    stroke-width="1"/>
  <text x="702" y="249" text-anchor="middle" fill="#ff9a9a" font-size="11.5">inconsistent</text>

  <text x="784" y="286" text-anchor="end" fill="#7e7e87" font-size="11">time →</text>
</svg>
