<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="Inter, ui-sans-serif, sans-serif">
  <defs>
    <marker id="a14" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#a8b1ff"/>
    </marker>
    <marker id="r14" viewBox="0 -5 10 10" refX="10" refY="0" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,-5L10,0L0,5" fill="#41d1ff"/>
    </marker>
  </defs>

  <rect x="280" y="30" width="240" height="50" rx="8" fill="rgba(189,52,254,0.10)" stroke="#bd34fe" stroke-width="1.5"/>
  <text x="400" y="60" text-anchor="middle" fill="#fcfcf7" font-size="14" font-family="ui-monospace, Menlo, Monaco, Consolas, monospace">Authors.Get(chatId, authorId)</text>

  <line x1="400" y1="80" x2="400" y2="115" stroke="#a8b1ff" stroke-width="2" marker-end="url(#a14)"/>

  <rect x="240" y="120" width="320" height="50" rx="8" fill="rgba(168,177,255,0.10)" stroke="#a8b1ff" stroke-width="1.5"/>
  <text x="400" y="143" text-anchor="middle" fill="#fcfcf7" font-size="14">Fusion proxy</text>
  <text x="400" y="161" text-anchor="middle" fill="#7e7e87" font-size="11">shard key from args → Maglev → owning host</text>

  <line x1="320" y1="170" x2="180" y2="220" stroke="#a8b1ff" stroke-width="2" marker-end="url(#a14)"/>
  <line x1="480" y1="170" x2="620" y2="220" stroke="#41d1ff" stroke-width="2" marker-end="url(#r14)"/>

  <rect x="60" y="225" width="240" height="50" rx="8" fill="rgba(74,222,128,0.10)" stroke="#4ade80" stroke-width="2"/>
  <text x="180" y="248" text-anchor="middle" fill="#fcfcf7" font-size="13">owner = this host</text>
  <text x="180" y="266" text-anchor="middle" fill="#4ade80" font-size="11">→ in-process call</text>

  <rect x="500" y="225" width="240" height="50" rx="8" fill="rgba(65,209,255,0.10)" stroke="#41d1ff" stroke-width="2"/>
  <text x="620" y="248" text-anchor="middle" fill="#fcfcf7" font-size="13">owner = remote host</text>
  <text x="620" y="266" text-anchor="middle" fill="#41d1ff" font-size="11">→ RPC over the wire</text>

  <rect x="60" y="295" width="240" height="50" rx="8" fill="rgba(168,177,255,0.06)" stroke="#a8b1ff" stroke-width="1"/>
  <text x="180" y="325" text-anchor="middle" fill="#fcfcf7" font-size="13">local impl</text>

  <rect x="500" y="295" width="240" height="50" rx="8" fill="rgba(168,177,255,0.06)" stroke="#a8b1ff" stroke-width="1"/>
  <text x="620" y="325" text-anchor="middle" fill="#fcfcf7" font-size="13">remote impl (same interface)</text>

  <line x1="180" y1="275" x2="180" y2="290" stroke="#7e7e87" stroke-width="1" marker-end="url(#a14)"/>
  <line x1="620" y1="275" x2="620" y2="290" stroke="#7e7e87" stroke-width="1" marker-end="url(#a14)"/>

  <text x="400" y="385" text-anchor="middle" fill="#7e7e87" font-size="12">The application code calls one method. Routing is transparent.</text>
</svg>
