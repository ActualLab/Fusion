<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" width="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    
    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>
    
    <linearGradient id="actionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9f0" />
      <stop offset="100%" stop-color="#faecd8" />
    </linearGradient>
    
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8fc" />
      <stop offset="100%" stop-color="#ddd0f0" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b90a8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="10" fill="url(#bgGrad)" />

  <!-- Subgraph Box -->
  <rect x="590" y="110" width="240" height="320" rx="8" fill="rgba(200,215,240,0.15)" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="710" y="135" text-anchor="middle" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase">Server-Side Invalidation</text>

  <!-- Edges -->
  <path d="M 300 105 L 300 140" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  
  <path d="M 220 200 C 150 200, 150 250, 150 315" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="185" y="185" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic">Yes &amp; Consistent</text>
  
  <path d="M 380 200 C 450 200, 450 250, 450 320" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="415" y="185" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic">No or Inconsistent</text>
  
  <path d="M 450 360 L 450 415" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M 450 465 L 450 520" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  
  <path d="M 710 205 L 710 255" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M 710 305 L 710 355" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />

  <!-- Nodes -->
  <!-- Call (Action) -->
  <rect x="210" y="55" width="180" height="50" rx="14" fill="url(#actionGrad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="300" y="75" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Client calls</text>
  <text x="300" y="93" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">service.GetData()</text>

  <!-- Check (Decision) -->
  <polygon points="300,140 380,200 300,260 220,200" fill="url(#decisionGrad)" stroke="#baa8d4" stroke-width="1.5" />
  <text x="300" y="195" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Cached</text>
  <text x="300" y="213" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Computed&lt;T&gt;?</text>

  <!-- Return (Action) -->
  <rect x="60" y="315" width="180" height="50" rx="14" fill="url(#actionGrad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="150" y="335" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Return cached value</text>
  <text x="150" y="353" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">(no RPC)</text>

  <!-- RPC (Action) -->
  <rect x="380" y="320" width="140" height="40" rx="14" fill="url(#actionGrad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="450" y="345" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Make RPC call</text>

  <!-- Cache (Action) -->
  <rect x="360" y="415" width="180" height="50" rx="14" fill="url(#actionGrad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="450" y="435" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Cache as</text>
  <text x="450" y="453" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Computed&lt;T&gt; replica</text>

  <!-- Return2 (Action) -->
  <rect x="380" y="520" width="140" height="40" rx="14" fill="url(#actionGrad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="450" y="545" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Return value</text>

  <!-- ServerInv (State) -->
  <rect x="620" y="155" width="180" height="50" rx="8" fill="url(#stateGrad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="710" y="175" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Server Computed&lt;T&gt;</text>
  <text x="710" y="193" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">invalidated</text>

  <!-- Notify (Action) -->
  <rect x="630" y="255" width="160" height="50" rx="14" fill="url(#actionGrad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="710" y="275" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Send invalidation</text>
  <text x="710" y="293" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">to client</text>

  <!-- ClientInv (State) -->
  <rect x="620" y="355" width="180" height="50" rx="8" fill="url(#stateGrad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="710" y="375" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">Client replica</text>
  <text x="710" y="393" text-anchor="middle" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e">marked Inconsistent</text>

</svg>