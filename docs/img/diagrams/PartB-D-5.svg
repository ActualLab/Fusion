<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 880" width="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    
    <linearGradient id="stateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>
    
    <linearGradient id="actionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9f0" />
      <stop offset="100%" stop-color="#faecd8" />
    </linearGradient>
    
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8fc" />
      <stop offset="100%" stop-color="#ddd0f0" />
    </linearGradient>

    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b90a8" />
    </marker>

    <style>
      .code-text { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 13px; fill: #1a1a2e; text-anchor: middle; }
      .label-text { font-family: Inter, -apple-system, sans-serif; font-size: 11px; fill: #6b7084; font-style: italic; }
      .header-text { font-family: Inter, sans-serif; font-size: 11px; fill: #8b90a8; font-weight: 600; text-transform: uppercase; }
      .edge-path { fill: none; stroke: #8b90a8; stroke-width: 1.5; stroke-linecap: round; }
      .subgraph-box { fill: rgba(200,215,240,0.15); stroke: #c0c8d4; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .state-node { fill: url(#stateGrad); stroke: #bcc8da; stroke-width: 1.5; }
      .action-node { fill: url(#actionGrad); stroke: #e0cba8; stroke-width: 1.5; }
      .decision-node { fill: url(#decisionGrad); stroke: #baa8d4; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="10" ry="10" />

  <!-- Subgraphs -->
  <!-- Server Subgraph -->
  <rect x="270" y="20" width="260" height="100" rx="8" ry="8" class="subgraph-box" />
  <text x="285" y="40" class="header-text">Server</text>

  <!-- Client Subgraph -->
  <rect x="60" y="160" width="800" height="680" rx="8" ry="8" class="subgraph-box" />
  <text x="75" y="180" class="header-text">Client</text>

  <!-- Edges -->
  <!-- IAuth -> ASP -->
  <path d="M 400 110 L 400 190" class="edge-path" marker-end="url(#arrowhead)" />
  <text x="410" y="145" class="label-text" text-anchor="start">RPC / Invalidation</text>

  <!-- ASP -> Methods -->
  <path d="M 320 250 C 320 290, 220 290, 220 330" class="edge-path" marker-end="url(#arrowhead)" />
  <text x="260" y="285" class="label-text" text-anchor="end">Computes</text>

  <!-- ASP -> Recompute -->
  <path d="M 480 250 C 480 290, 580 290, 580 330" class="edge-path" marker-end="url(#arrowhead)" />
  <text x="540" y="285" class="label-text" text-anchor="start">On invalidation</text>

  <!-- Recompute -> CAS -->
  <path d="M 580 390 L 580 470" class="edge-path" marker-end="url(#arrowhead)" />

  <!-- CAS -> Normal -->
  <path d="M 520 530 C 520 570, 440 570, 440 615" class="edge-path" marker-end="url(#arrowhead)" />

  <!-- CAS -> Forced -->
  <path d="M 640 530 C 640 565, 720 565, 720 600" class="edge-path" marker-end="url(#arrowhead)" />

  <!-- Normal -> Children -->
  <path d="M 440 665 C 440 705, 520 705, 520 750" class="edge-path" marker-end="url(#arrowhead)" />

  <!-- Forced -> Children -->
  <path d="M 720 680 C 720 715, 640 715, 640 750" class="edge-path" marker-end="url(#arrowhead)" />
  <text x="690" y="720" class="label-text" text-anchor="start">Force page reload</text>

  <!-- Nodes -->
  <!-- IAuth (State Node) -->
  <rect x="290" y="50" width="220" height="60" rx="8" ry="8" class="state-node" />
  <text x="400" y="75" class="code-text">IAuth</text>
  <text x="400" y="95" class="code-text">(Compute Service)</text>

  <!-- ASP (State Node) -->
  <rect x="230" y="190" width="340" height="60" rx="8" ry="8" class="state-node" />
  <text x="400" y="215" class="code-text">AuthStateProvider</text>
  <text x="400" y="235" class="code-text">(ComputedState&lt;AuthState&gt;)</text>

  <!-- Methods (Action Node) -->
  <rect x="90" y="330" width="260" height="60" rx="14" ry="14" class="action-node" />
  <text x="220" y="365" class="code-text">GetUser() + IsSignOutForced()</text>

  <!-- Recompute (Action Node) -->
  <rect x="390" y="330" width="380" height="60" rx="14" ry="14" class="action-node" />
  <text x="580" y="350" class="code-text">1. Recomputes auth state</text>
  <text x="580" y="370" class="code-text">2. Fires NotifyAuthenticationStateChanged()</text>

  <!-- CAS (State Node) -->
  <rect x="460" y="470" width="240" height="60" rx="8" ry="8" class="state-node" />
  <text x="580" y="505" class="code-text">CascadingAuthState Component</text>

  <!-- Normal (Action Node) -->
  <rect x="370" y="615" width="140" height="50" rx="14" ry="14" class="action-node" />
  <text x="440" y="645" class="code-text">Normal update</text>

  <!-- Forced (Decision Node) -->
  <polygon points="720,600 830,640 720,680 610,640" class="decision-node" />
  <text x="720" y="645" class="code-text">IsSignOutForced = true</text>

  <!-- Children (State Node) -->
  <rect x="400" y="750" width="360" height="60" rx="8" ry="8" class="state-node" />
  <text x="580" y="775" class="code-text">Child Components</text>
  <text x="580" y="795" class="code-text">(&lt;AuthorizeView&gt;, [CascadingParameter])</text>

</svg>