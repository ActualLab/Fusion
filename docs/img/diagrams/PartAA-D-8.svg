<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 600" width="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4f8fd" />
            <stop offset="50%" stop-color="#eaf1fb" />
            <stop offset="100%" stop-color="#e2ebf7" />
        </linearGradient>
        
        <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e8f0fc" />
            <stop offset="100%" stop-color="#d4e3f7" />
        </linearGradient>
        
        <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fef9f0" />
            <stop offset="100%" stop-color="#faecd8" />
        </linearGradient>

        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 2 L 8 5 L 0 8 Z" fill="#8b90a8" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

    <!-- Paths / Edges -->
    <!-- Start -> Wait -->
    <path d="M 400 62 L 400 120" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    
    <!-- Wait -> Call -->
    <path d="M 400 180 L 400 245" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    
    <!-- Call -> Success -->
    <path d="M 360 295 C 360 330 260 330 260 370" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    
    <!-- Call -> Failure -->
    <path d="M 440 295 C 440 330 540 330 540 370" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    
    <!-- Success -> Wait (Loop back) -->
    <path d="M 200 390 C 50 390 50 150 300 150" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    
    <!-- Failure -> Retry -->
    <path d="M 540 410 L 540 480" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    
    <!-- Retry -> Call (Loop back) -->
    <path d="M 650 510 C 800 510 800 270 530 270" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />

    <!-- Nodes -->
    <!-- Start Node -->
    <circle cx="400" cy="50" r="12" fill="#8b90a8" />
    <text x="420" y="54" font-family="Inter, sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" style="text-transform: uppercase;">Start</text>

    <!-- Wait Node (Action/Process) -->
    <rect x="300" y="120" width="200" height="60" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="400" y="142" text-anchor="middle" font-family="&quot;SF Mono&quot;, &quot;Fira Code&quot;, Consolas, monospace" font-size="13px" fill="#1a1a2e">Wait UpdatePeriod</text>
    <text x="400" y="162" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">(3 min ± 5%)</text>

    <!-- Call Node (Action/Process) -->
    <rect x="270" y="245" width="260" height="50" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="400" y="274" text-anchor="middle" font-family="&quot;SF Mono&quot;, &quot;Fira Code&quot;, Consolas, monospace" font-size="13px" fill="#1a1a2e">IAuth.UpdatePresence(session)</text>

    <!-- Success Node (State/Object) -->
    <rect x="200" y="370" width="120" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="260" y="394" text-anchor="middle" font-family="Inter, sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" style="text-transform: uppercase;">Success</text>

    <!-- Failure Node (State/Object) -->
    <rect x="480" y="370" width="120" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="540" y="394" text-anchor="middle" font-family="Inter, sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" style="text-transform: uppercase;">Failure</text>

    <!-- Retry Node (Action/Process) -->
    <rect x="430" y="480" width="220" height="60" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="540" y="502" text-anchor="middle" font-family="&quot;SF Mono&quot;, &quot;Fira Code&quot;, Consolas, monospace" font-size="13px" fill="#1a1a2e">Wait RetryDelay</text>
    <text x="540" y="522" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">(exponential backoff)</text>
</svg>