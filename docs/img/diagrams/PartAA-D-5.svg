<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 500" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#8b90a8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

  <!-- Edges (Arrows) -->
  <!-- Start -> Anonymous -->
  <path d="M 58 250 L 102 250" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="80" y="242" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">User visits site</text>

  <!-- Anonymous -> Authenticated -->
  <path d="M 390 240 L 532 240" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="461" y="232" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Sign In (OAuth)</text>

  <!-- Authenticated -> Anonymous -->
  <path d="M 540 260 L 398 260" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="469" y="275" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Sign Out (normal)</text>

  <!-- Authenticated -> Invalidated -->
  <path d="M 650 280 L 650 362" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="660" y="325" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="start">Force Sign Out</text>

  <!-- Invalidated -> NewSession -->
  <path d="M 540 400 L 328 400" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="434" y="392" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">New Session Created</text>

  <!-- NewSession -> Anonymous -->
  <path d="M 250 380 L 250 288" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />

  <!-- Anonymous -> Expired -->
  <path d="M 250 220 C 250 150, 390 170, 390 118" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="240" y="160" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="end">LastSeenAt &gt; MaxSessionAge</text>

  <!-- Authenticated -> Expired -->
  <path d="M 650 220 C 650 150, 510 170, 510 118" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="660" y="160" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="start">LastSeenAt &gt; MaxSessionAge</text>


  <!-- Nodes -->
  <!-- Start Node -->
  <circle cx="50" cy="250" r="8" fill="#8b90a8" />

  <!-- Anonymous Session -->
  <rect x="110" y="220" width="280" height="60" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="250" y="240" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">Anonymous Session</text>
  <text x="250" y="260" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Cookie set, session stored in DB</text>

  <!-- Authenticated Session -->
  <rect x="540" y="220" width="220" height="60" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="650" y="240" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">Authenticated Session</text>
  <text x="650" y="260" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Session has UserId set</text>

  <!-- Invalidated Session -->
  <rect x="540" y="370" width="220" height="60" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="650" y="390" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">Invalidated Session</text>
  <text x="650" y="410" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">IsSignOutForced = true</text>

  <!-- New Session -->
  <rect x="180" y="380" width="140" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="250" y="404" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">New Session</text>

  <!-- Expired Session -->
  <rect x="320" y="50" width="260" height="60" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="450" y="70" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">Session Expired</text>
  <text x="450" y="90" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">DbSessionInfoTrimmer deletes</text>

</svg>