<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd"/>
      <stop offset="50%" stop-color="#eaf1fb"/>
      <stop offset="100%" stop-color="#e2ebf7"/>
    </linearGradient>
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc"/>
      <stop offset="100%" stop-color="#d4e3f7"/>
    </linearGradient>
    <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9f0"/>
      <stop offset="100%" stop-color="#faecd8"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b90a8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="10" fill="url(#bg-grad)" />

  <!-- Subgraph Box: Timeline -->
  <rect x="30" y="40" width="640" height="140" rx="8" fill="rgba(200,215,240,0.15)" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6 4" />
  <text x="45" y="65" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase">TIMELINE</text>

  <!-- Edge 1: Ignored to Start (Undirected) -->
  <path d="M 220 110 C 260 110, 320 110, 360 110" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" fill="none" />
  <text x="290" y="100" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic">StartOffset (3s)</text>

  <!-- Edge 2: Start to Future (Directed) -->
  <path d="M 500 110 C 520 110, 550 110, 572 110" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" fill="none" marker-end="url(#arrow)" />

  <!-- Node 1: Ignored (State/Period) -->
  <rect x="60" y="80" width="160" height="60" rx="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="140" y="104" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e">Ignored on</text>
  <text x="140" y="122" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e">startup</text>

  <!-- Node 2: Start (Action/Event) -->
  <rect x="360" y="80" width="140" height="60" rx="14" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="430" y="104" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e">Service</text>
  <text x="430" y="122" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e">Start</text>

  <!-- Node 3: Future (State/Continuation) -->
  <rect x="580" y="80" width="60" height="60" rx="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="610" y="114" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e">...</text>

</svg>