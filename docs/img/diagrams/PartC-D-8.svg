<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" width="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4f8fd" />
            <stop offset="50%" stop-color="#eaf1fb" />
            <stop offset="100%" stop-color="#e2ebf7" />
        </linearGradient>
        <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e8f0fc" />
            <stop offset="100%" stop-color="#d4e3f7" />
        </linearGradient>
        <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fef9f0" />
            <stop offset="100%" stop-color="#faecd8" />
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b90a8" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

    <!-- Edges / Arrows -->
    <path d="M 470 90 C 470 120, 280 120, 280 150" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    <path d="M 470 90 C 470 120, 660 120, 660 150" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    <path d="M 280 190 C 280 230, 280 230, 280 270" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    <path d="M 280 350 C 280 380, 280 380, 280 410" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
    <path d="M 660 190 C 660 230, 660 230, 660 270" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />

    <!-- Nodes -->
    
    <!-- Add -->
    <rect x="360" y="50" width="220" height="40" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="470" y="75" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">services.AddCommander()</text>

    <!-- Handlers -->
    <rect x="130" y="150" width="300" height="40" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="280" y="175" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">.AddHandlers&lt;OrderHandlers&gt;()</text>

    <!-- Service -->
    <rect x="520" y="150" width="280" height="40" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="660" y="175" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">.AddService&lt;OrderService&gt;()</text>

    <!-- Scan1 -->
    <rect x="110" y="270" width="340" height="80" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="130" y="295" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#6b7084" font-style="italic" text-anchor="start">Scan for:</text>
    <text x="130" y="315" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="start">• ICommandHandler&lt;T&gt; interfaces</text>
    <text x="130" y="335" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="start">• Methods with [CommandHandler]</text>

    <!-- Scan2 -->
    <rect x="490" y="270" width="340" height="80" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="510" y="295" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="start">1. Register with proxy</text>
    <text x="510" y="315" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="start">2. Scan for [CommandHandler] methods</text>
    <text x="510" y="335" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="start">3. Proxy prevents direct calls (throws)</text>

    <!-- Desc (State/Object node representing the resulting data descriptors) -->
    <rect x="90" y="410" width="380" height="60" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="280" y="432" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#6b7084" font-style="italic" text-anchor="middle">Create CommandHandler descriptors:</text>
    <text x="280" y="452" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">ServiceType, CommandType, Priority, IsFilter</text>

</svg>