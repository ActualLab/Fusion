<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 180" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#8b90a8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

  <!-- Header -->
  <text x="30" y="30" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-anchor="start">COMPUTED&lt;T&gt; LIFECYCLE STATES</text>

  <!-- Arrows -->
  <!-- Start to Computing -->
  <path d="M 58 80 L 97 80" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrowhead)" />

  <!-- Computing to Consistent -->
  <path d="M 210 80 L 287 80" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <text x="250" y="74" font-family="Inter,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">completes</text>

  <!-- Consistent to Inconsistent -->
  <path d="M 400 80 L 477 80" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrowhead)" />
  <text x="440" y="74" font-family="Inter,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Invalidate()</text>

  <!-- Computing to Inconsistent (Curved) -->
  <path d="M 155 100 L 155 135 Q 155 150 170 150 L 525 150 Q 540 150 540 135 L 540 103" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" fill="none" marker-end="url(#arrowhead)" />
  <text x="347.5" y="144" font-family="Inter,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">invalidated while computing</text>

  <!-- Nodes -->
  <!-- Start Node -->
  <circle cx="50" cy="80" r="8" fill="#8b90a8" />

  <!-- Computing Node -->
  <rect x="100" y="60" width="110" height="40" rx="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="155" y="84" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Computing</text>

  <!-- Consistent Node -->
  <rect x="290" y="60" width="110" height="40" rx="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="345" y="84" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Consistent</text>

  <!-- Inconsistent Node -->
  <rect x="480" y="60" width="120" height="40" rx="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="540" y="84" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Inconsistent</text>

</svg>