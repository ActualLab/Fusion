<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 160" width="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>

    <!-- State/Object Node Gradient -->
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#8b90a8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

  <!-- Header -->
  <text x="40" y="30" font-family="Inter, sans-serif" font-size="11" fill="#8b90a8" font-weight="600" text-transform="uppercase">Session Resolution Flow</text>

  <!-- Arrows -->
  <!-- RpcCall to Connection -->
  <path d="M 320 90 C 340 90, 360 90, 372 90" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  
  <!-- Connection to Session -->
  <path d="M 600 90 C 620 90, 640 90, 652 90" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />

  <!-- Nodes -->
  <!-- Node 1: RpcCall (State/Object) -->
  <rect x="40" y="60" width="280" height="60" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="180" y="81" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">RpcInboundCall</text>
  <text x="180" y="101" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">call.Context.Peer.ConnectionState</text>

  <!-- Node 2: Connection (State/Object) -->
  <rect x="380" y="65" width="220" height="50" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="490" y="94" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">SessionBoundRpcConnection</text>

  <!-- Node 3: Session (State/Object) -->
  <rect x="660" y="60" width="180" height="60" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="750" y="81" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13" fill="#1a1a2e" text-anchor="middle">Session</text>
  <text x="750" y="101" font-family="Inter, -apple-system, sans-serif" font-size="11" fill="#6b7084" font-style="italic" text-anchor="middle">(from cookie/auth token)</text>

</svg>