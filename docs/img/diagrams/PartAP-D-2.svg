<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 200" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>

    <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9f0" />
      <stop offset="100%" stop-color="#faecd8" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 6 6" refX="4" refY="3" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#8b90a8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" rx="10" fill="url(#bg-grad)" />

  <!-- Edges -->
  <path d="M 250 100 C 270 100, 310 100, 324 100" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="290" y="92" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#6b7084" font-style="italic">scans</text>

  <path d="M 530 100 C 550 100, 590 100, 604 100" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="570" y="92" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#6b7084" font-style="italic">emits</text>

  <!-- Node 1: Interface (State/Object) -->
  <rect x="50" y="60" width="200" height="80" rx="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="150" y="83" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8b90a8" font-weight="600" text-transform="uppercase">Your Interface</text>
  <text x="150" y="103" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13" fill="#1a1a2e">IGreetingService</text>
  <text x="150" y="123" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13" fill="#1a1a2e">: IRequiresAsyncProxy</text>

  <!-- Node 2: Source Generator (Action/Process) -->
  <rect x="330" y="60" width="200" height="80" rx="14" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" />
  <text x="430" y="83" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8b90a8" font-weight="600" text-transform="uppercase">Source Generator</text>
  <text x="430" y="103" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13" fill="#1a1a2e">ActualLab.Generators</text>
  <text x="430" y="123" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13" fill="#1a1a2e">ProxyGenerator</text>

  <!-- Node 3: Generated Proxy (State/Object) -->
  <rect x="610" y="60" width="300" height="80" rx="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="760" y="83" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#8b90a8" font-weight="600" text-transform="uppercase">Generated Proxy</text>
  <text x="760" y="103" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13" fill="#1a1a2e">IGreetingServiceProxy</text>
  <text x="760" y="123" text-anchor="middle" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13" fill="#1a1a2e">: InterfaceProxy, IGreetingService</text>
</svg>