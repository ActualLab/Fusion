<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>
    
    <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9f0" />
      <stop offset="100%" stop-color="#faecd8" />
    </linearGradient>
    
    <linearGradient id="decision-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8fc" />
      <stop offset="100%" stop-color="#ddd0f0" />
    </linearGradient>

    <marker id="arrowhead" viewBox="0 0 6 6" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#8b90a8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" ry="10" />

  <!-- Subgraphs -->
  <!-- Client Subgraph -->
  <rect x="100" y="40" width="600" height="160" fill="rgba(200,215,240,0.15)" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6 4" rx="8" ry="8" />
  <text x="115" y="65" font-family="Inter,sans-serif" font-size="11" fill="#8b90a8" font-weight="600" text-transform="uppercase">Blazor WASM Client</text>

  <!-- Server Subgraph -->
  <rect x="60" y="250" width="680" height="420" fill="rgba(200,215,240,0.15)" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6 4" rx="8" ry="8" />
  <text x="75" y="275" font-family="Inter,sans-serif" font-size="11" fill="#8b90a8" font-weight="600" text-transform="uppercase">Server</text>

  <!-- Edges (Arrows) -->
  <!-- SR to Call -->
  <path d="M 400 110 L 400 130" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-linecap="round" />
  
  <!-- Call to Replacer -->
  <path d="M 400 180 L 400 270" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-linecap="round" />
  <text x="410" y="230" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#6b7084" font-style="italic">RPC Call: GetUser(session: ~)</text>

  <!-- Replacer to Check -->
  <path d="M 400 320 L 400 340" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-linecap="round" />

  <!-- Check to Replace (Yes) -->
  <path d="M 320 390 C 240 390, 240 430, 240 460" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-linecap="round" />
  <text x="270" y="380" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#6b7084" font-style="italic">Yes</text>

  <!-- Check to Pass (No) -->
  <path d="M 480 390 C 560 390, 560 430, 560 470" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-linecap="round" />
  <text x="530" y="380" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#6b7084" font-style="italic">No</text>

  <!-- Replace to IAuth -->
  <path d="M 240 530 C 240 560, 380 560, 380 580" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-linecap="round" />

  <!-- Pass to IAuth -->
  <path d="M 560 520 C 560 560, 420 560, 420 580" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)" stroke-linecap="round" />

  <!-- Nodes -->
  <!-- SR (State/Object) -->
  <rect x="210" y="70" width="380" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" ry="8" />
  <text x="400" y="95" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#1a1a2e">SessionResolver.Session = Session.Default (~)</text>

  <!-- Call (Action/Process) -->
  <rect x="230" y="140" width="340" height="40" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" ry="14" />
  <text x="400" y="165" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#1a1a2e">await Auth.GetUser(Session.Default, ct)</text>

  <!-- Replacer (State/Object) -->
  <rect x="280" y="280" width="240" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" ry="8" />
  <text x="400" y="305" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#1a1a2e">RpcDefaultSessionReplacer</text>

  <!-- Check (Decision) -->
  <polygon points="400,350 480,390 400,430 320,390" fill="url(#decision-grad)" stroke="#baa8d4" stroke-width="1.5" />
  <text x="400" y="395" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#1a1a2e">Session == ~ ?</text>

  <!-- Replace (Action/Process) -->
  <rect x="90" y="470" width="300" height="60" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" ry="14" />
  <text x="240" y="495" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#1a1a2e">Replace with SessionResolver.Session</text>
  <text x="240" y="515" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#6b7084" font-style="italic">(real session from cookie)</text>

  <!-- Pass (Action/Process) -->
  <rect x="450" y="480" width="220" height="40" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" ry="14" />
  <text x="560" y="505" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#1a1a2e">Pass through unchanged</text>

  <!-- IAuth (State/Object) -->
  <rect x="300" y="590" width="200" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" ry="8" />
  <text x="400" y="615" text-anchor="middle" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="13" fill="#1a1a2e">IAuth Implementation</text>

</svg>