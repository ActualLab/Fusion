<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 600" width="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>

    <!-- State/Object Node Gradient (Blue) -->
    <linearGradient id="state-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>

    <!-- Action/Process Node Gradient (Amber) -->
    <linearGradient id="action-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9f0" />
      <stop offset="100%" stop-color="#faecd8" />
    </linearGradient>

    <!-- Arrow Marker -->
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#8b90a8" />
    </marker>

    <style>
      .code {
        font-family: "SF Mono", "Fira Code", Consolas, monospace;
        font-size: 13px;
        fill: #1a1a2e;
      }
      .label {
        font-family: Inter, -apple-system, sans-serif;
        font-size: 11px;
        fill: #6b7084;
        font-style: italic;
      }
      .header {
        font-family: Inter, sans-serif;
        font-size: 11px;
        fill: #8b90a8;
        font-weight: 600;
        text-transform: uppercase;
      }
      .edge {
        stroke: #8b90a8;
        stroke-width: 1.5;
        fill: none;
        stroke-linecap: round;
      }
      .subgraph {
        fill: rgba(200,215,240,0.15);
        stroke: #c0c8d4;
        stroke-width: 1.5;
        stroke-dasharray: 6 4;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

  <!-- Client Subgraph -->
  <rect x="40" y="40" width="560" height="165" class="subgraph" rx="8" />
  <text x="55" y="60" class="header">Client</text>

  <!-- Cmd Node (State/Object) -->
  <rect x="60" y="75" width="520" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="320" y="100" class="code" text-anchor="middle">var cmd = new UpdateProfileCommand { Session = Session.Default }</text>

  <!-- Call Node (Action/Process) -->
  <rect x="220" y="145" width="200" height="40" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
  <text x="320" y="170" class="code" text-anchor="middle">Commander.Call(cmd)</text>

  <!-- Server Subgraph -->
  <rect x="40" y="250" width="560" height="310" class="subgraph" rx="8" />
  <text x="55" y="270" class="header">Server</text>

  <!-- Inbound Node (State/Object) -->
  <rect x="220" y="285" width="200" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="320" y="310" class="code" text-anchor="middle">RPC Inbound Pipeline</text>

  <!-- Replacer Node (State/Object) -->
  <rect x="140" y="375" width="360" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="320" y="400" class="code" text-anchor="middle">RpcDefaultSessionReplacer (IRpcMiddleware)</text>

  <!-- Handler Node (State/Object) -->
  <rect x="120" y="490" width="400" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
  <text x="320" y="515" class="code" text-anchor="middle">Command Handler — cmd.Session is now valid!</text>

  <!-- Edges -->
  <!-- Cmd -> Call -->
  <path d="M 320 115 L 320 145" class="edge" marker-end="url(#arrow)" />
  
  <!-- Call -> Inbound -->
  <path d="M 320 185 L 320 285" class="edge" marker-end="url(#arrow)" />
  <text x="330" y="240" class="label">RPC Call</text>

  <!-- Inbound -> Replacer -->
  <path d="M 320 325 L 320 375" class="edge" marker-end="url(#arrow)" />

  <!-- Replacer -> Handler -->
  <path d="M 320 415 L 320 490" class="edge" marker-end="url(#arrow)" />
  <text x="330" y="455" class="label">Session.Default → actual-session-id</text>

</svg>