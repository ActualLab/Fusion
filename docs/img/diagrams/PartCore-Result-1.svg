<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b90a8" />
    </marker>
  </defs>

  <rect width="100%" height="100%" rx="10" fill="url(#bg-grad)" />

  <text x="30" y="40" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase">Result Hierarchy</text>

  <g fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M 180,180 C 180,140 280,140 280,104" />
    <path d="M 420,180 C 420,140 320,140 320,104" />
    <path d="M 250,300 C 250,260 180,260 180,224" />
    <path d="M 350,300 C 350,260 420,260 420,224" />
  </g>

  <g stroke="#bcc8da" stroke-width="1.5" fill="url(#state-grad)">
    <rect x="220" y="60" width="160" height="44" rx="8" />
    <rect x="100" y="180" width="160" height="44" rx="8" />
    <rect x="340" y="180" width="160" height="44" rx="8" />
    <rect x="200" y="300" width="200" height="44" rx="8" />
  </g>

  <g font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">
    <text x="300" y="87">IResult</text>
    <text x="180" y="207">IResult&lt;T&gt;</text>
    <text x="420" y="207">IMutableResult</text>
    <text x="300" y="327">IMutableResult&lt;T&gt;</text>
