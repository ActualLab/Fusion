<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 860" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>
    <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef9f0" />
      <stop offset="100%" stop-color="#faecd8" />
    </linearGradient>
    <linearGradient id="decision-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8fc" />
      <stop offset="100%" stop-color="#ddd0f0" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8b90a8" />
    </marker>
  </defs>

  <style>
    .code { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 13px; fill: #1a1a2e; }
    .label { font-family: Inter, -apple-system, sans-serif; font-size: 11px; fill: #6b7084; font-style: italic; }
    .header { font-family: Inter, sans-serif; font-size: 11px; fill: #8b90a8; font-weight: 600; text-transform: uppercase; }
    .edge-label { font-family: Inter, -apple-system, sans-serif; font-size: 11px; fill: #6b7084; font-style: italic; }
    .arrow { stroke: #8b90a8; stroke-width: 1.5; fill: none; stroke-linecap: round; marker-end: url(#arrow); }
    .subgraph { fill: rgba(200,215,240,0.15); stroke: #c0c8d4; stroke-width: 1.5; stroke-dasharray: 6 4; }
    .state { fill: url(#state-grad); stroke: #bcc8da; stroke-width: 1.5; }
    .action { fill: url(#action-grad); stroke: #e0cba8; stroke-width: 1.5; }
    .decision { fill: url(#decision-grad); stroke: #baa8d4; stroke-width: 1.5; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

  <!-- Subgraph: Registration -->
  <rect x="200" y="40" width="500" height="160" rx="8" class="subgraph" />
  <text x="215" y="65" class="header">REGISTRATION</text>

  <!-- Subgraph: Call Flow -->
  <rect x="100" y="240" width="700" height="580" rx="8" class="subgraph" />
  <text x="115" y="265" class="header">CALL FLOW</text>

  <!-- Edges -->
  <path d="M 450,100 L 450,125" class="arrow" />
  <path d="M 300,320 L 300,360" class="arrow" />
  <path d="M 300,400 L 300,440" class="arrow" />
  <path d="M 300,540 L 300,760" class="arrow" />
  <text x="315" y="600" class="edge-label">Yes</text>
  <path d="M 430,490 L 500,490" class="arrow" />
  <text x="465" y="482" class="edge-label">No</text>
  <path d="M 650,510 L 650,555" class="arrow" />
  <path d="M 650,605 L 650,650" class="arrow" />
  <path d="M 650,690 C 650,780 550,780 460,780" class="arrow" />

  <!-- Nodes: Registration -->
  <rect x="280" y="60" width="340" height="40" rx="14" class="action" />
  <text x="450" y="85" class="code" text-anchor="middle" dominant-baseline="middle">commander.AddService&lt;OrderService&gt;()</text>

  <rect x="270" y="125" width="360" height="50" rx="8" class="state" />
  <text x="450" y="142" class="label" text-anchor="middle" dominant-baseline="middle">Runtime generates:</text>
  <text x="450" y="158" class="code" text-anchor="middle" dominant-baseline="middle">OrderServiceProxy : OrderService</text>

  <!-- Nodes: Call Flow -->
  <rect x="150" y="280" width="300" height="40" rx="14" class="action" />
  <text x="300" y="305" class="code" text-anchor="middle" dominant-baseline="middle">orderService.CreateOrder(cmd, ct)</text>

  <rect x="160" y="360" width="280" height="40" rx="14" class="action" />
  <text x="300" y="385" class="code" text-anchor="middle" dominant-baseline="middle">OrderServiceProxy.CreateOrder()</text>

  <polygon points="300,440 430,490 300,540 170,490" class="decision" />
  <text x="300" y="482" class="code" text-anchor="middle" dominant-baseline="middle">CommandContext</text>
  <text x="300" y="500" class="label" text-anchor="middle" dominant-baseline="middle">exists and matches?</text>

  <rect x="150" y="760" width="300" height="40" rx="14" class="action" />
  <text x="300" y="785" class="code" text-anchor="middle" dominant-baseline="middle">OrderService.CreateOrder() executes</text>

  <rect x="500" y="470" width="300" height="40" rx="14" class="action" />
  <text x="650" y="495" class="code" text-anchor="middle" dominant-baseline="middle">Commander.Call(CreateOrderCommand)</text>

  <rect x="500" y="555" width="300" height="50" rx="14" class="action" />
  <text x="650" y="572" class="code" text-anchor="middle" dominant-baseline="middle">Creates CommandContext</text>
  <text x="650" y="588" class="code" text-anchor="middle" dominant-baseline="middle">Runs handler pipeline</text>

  <rect x="500" y="650" width="300" height="40" rx="14" class="action" />
  <text x="650" y="675" class="code" text-anchor="middle" dominant-baseline="middle">Pipeline invokes OrderServiceProxy</text>

</svg>