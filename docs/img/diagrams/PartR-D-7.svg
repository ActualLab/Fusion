<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4f8fd" />
            <stop offset="50%" stop-color="#eaf1fb" />
            <stop offset="100%" stop-color="#e2ebf7" />
        </linearGradient>
        <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e8f0fc" />
            <stop offset="100%" stop-color="#d4e3f7" />
        </linearGradient>
        <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fef9f0" />
            <stop offset="100%" stop-color="#faecd8" />
        </linearGradient>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b90a8" />
        </marker>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

    <!-- Lifelines -->
    <line x1="150" y1="80" x2="150" y2="560" stroke="#c0c8d4" stroke-dasharray="6 4" stroke-width="1.5" />
    <line x1="350" y1="80" x2="350" y2="560" stroke="#c0c8d4" stroke-dasharray="6 4" stroke-width="1.5" />
    <line x1="550" y1="80" x2="550" y2="560" stroke="#c0c8d4" stroke-dasharray="6 4" stroke-width="1.5" />
    <line x1="750" y1="80" x2="750" y2="560" stroke="#c0c8d4" stroke-dasharray="6 4" stroke-width="1.5" />

    <!-- Activation Boxes -->
    <rect x="142" y="140" width="16" height="110" fill="#e8f0fc" stroke="#bcc8da" stroke-width="1.5" rx="2" />
    <rect x="342" y="240" width="16" height="70" fill="#e8f0fc" stroke="#bcc8da" stroke-width="1.5" rx="2" />
    <rect x="542" y="300" width="16" height="70" fill="#e8f0fc" stroke="#bcc8da" stroke-width="1.5" rx="2" />
    <rect x="742" y="360" width="16" height="110" fill="#e8f0fc" stroke="#bcc8da" stroke-width="1.5" rx="2" />

    <!-- Headers (State Nodes) -->
    <rect x="80" y="40" width="140" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="150" y="64" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">Server Computed</text>

    <rect x="280" y="40" width="140" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="350" y="64" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">Call Tracker</text>

    <rect x="480" y="40" width="140" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="550" y="64" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">WebSocket</text>

    <rect x="680" y="40" width="140" height="40" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="750" y="64" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle">Client Replica</text>

    <!-- Notes (Action Nodes) -->
    <rect x="90" y="90" width="120" height="30" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="150" y="109" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Data changes</text>

    <rect x="650" y="490" width="200" height="30" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="750" y="509" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Next call will fetch fresh data</text>

    <!-- Messages -->
    <!-- Server -> Server: Invalidate() -->
    <path d="M 158 160 C 210 160, 210 190, 164 190" fill="none" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" stroke-linecap="round" />
    <text x="215" y="179" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e">Invalidate()</text>

    <!-- Server -> Tracker: Notify invalidation -->
    <line x1="158" y1="240" x2="336" y2="240" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" stroke-linecap="round" />
    <text x="250" y="232" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Notify invalidation</text>

    <!-- Tracker -> Transport: Invalidate(callId) -->
    <line x1="358" y1="300" x2="536" y2="300" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" stroke-linecap="round" />
    <text x="450" y="292" font-family="&quot;SF Mono&quot;,&quot;Fira Code&quot;,Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Invalidate(callId)</text>

    <!-- Transport -> Client: Invalidate message -->
    <line x1="558" y1="360" x2="736" y2="360" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" stroke-linecap="round" />
    <text x="650" y="352" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Invalidate message</text>

    <!-- Client -> Client: Mark Inconsistent -->
    <path d="M 758 420 C 810 420, 810 450, 764 450" fill="none" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" stroke-linecap="round" />
    <text x="815" y="439" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic">Mark Inconsistent</text>
</svg>