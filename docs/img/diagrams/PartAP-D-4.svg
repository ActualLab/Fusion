<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4f8fd" />
            <stop offset="50%" stop-color="#eaf1fb" />
            <stop offset="100%" stop-color="#e2ebf7" />
        </linearGradient>

        <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e8f0fc" />
            <stop offset="100%" stop-color="#d4e3f7" />
        </linearGradient>

        <linearGradient id="action-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fef9f0" />
            <stop offset="100%" stop-color="#faecd8" />
        </linearGradient>

        <linearGradient id="decision-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f0e8fc" />
            <stop offset="100%" stop-color="#ddd0f0" />
        </linearGradient>

        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b90a8" />
        </marker>
    </defs>

    <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

    <!-- Edges -->
    <path d="M 400 100 L 400 132" fill="none" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 320 180 C 220 180, 220 240, 220 302" fill="none" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" />
    <path d="M 480 180 C 580 180, 580 240, 580 302" fill="none" stroke="#8b90a8" stroke-width="1.5" marker-end="url(#arrow)" />

    <!-- Edge Labels -->
    <g transform="translate(280, 215)">
        <rect x="-45" y="-13" width="90" height="20" fill="#eaf1fb" rx="4" />
        <text x="0" y="1" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">Yes (1-4 args)</text>
    </g>
    <g transform="translate(520, 215)">
        <rect x="-50" y="-13" width="100" height="20" fill="#eaf1fb" rx="4" />
        <text x="0" y="1" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="middle">No (or 5+ args)</text>
    </g>

    <!-- Nodes -->
    <!-- Action Node: New -->
    <g transform="translate(400, 80)">
        <rect x="-170" y="-20" width="340" height="40" fill="url(#action-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
        <text x="0" y="4" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">ArgumentList.New&lt;T0, T1&gt;(arg0, arg1)</text>
    </g>

    <!-- Decision Node: Check -->
    <g transform="translate(400, 180)">
        <polygon points="0,-40 80,0 0,40 -80,0" fill="url(#decision-grad)" stroke="#baa8d4" stroke-width="1.5" />
        <text x="0" y="4" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">UseGenerics?</text>
    </g>

    <!-- State/Object Node (Class Diagram Style): Generic -->
    <g transform="translate(220, 365)">
        <rect x="-120" y="-55" width="240" height="110" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
        <text x="0" y="-33" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e" font-weight="bold" text-anchor="middle">ArgumentListG2&lt;T0,T1&gt;</text>
        <line x1="-120" y1="-20" x2="120" y2="-20" stroke="#bcc8da" stroke-width="1.5" />
        <text x="-105" y="0" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">• Generic storage</text>
        <text x="-105" y="18" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">• No boxing for value types</text>
        <text x="-105" y="36" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">• Faster access</text>
    </g>

    <!-- State/Object Node (Class Diagram Style): Simple -->
    <g transform="translate(580, 365)">
        <rect x="-120" y="-55" width="240" height="110" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
        <text x="0" y="-33" font-family="'SF Mono', 'Fira Code', Consolas, monospace" font-size="13px" fill="#1a1a2e" font-weight="bold" text-anchor="middle">ArgumentListS2</text>
        <line x1="-120" y1="-20" x2="120" y2="-20" stroke="#bcc8da" stroke-width="1.5" />
        <text x="-105" y="0" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">• object? storage</text>
        <text x="-105" y="18" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">• Boxing for value types</text>
        <text x="-105" y="36" font-family="Inter, -apple-system, sans-serif" font-size="11px" fill="#6b7084" font-style="italic">• All platforms</text>
    </g>
</svg>