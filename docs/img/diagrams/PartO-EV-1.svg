<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4f8fd" />
      <stop offset="50%" stop-color="#eaf1fb" />
      <stop offset="100%" stop-color="#e2ebf7" />
    </linearGradient>
    <linearGradient id="state-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8f0fc" />
      <stop offset="100%" stop-color="#d4e3f7" />
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 2 L 10 5 L 0 8 Z" fill="#8b90a8" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" ry="10" />

  <text x="300" y="30" font-family="Inter,sans-serif" font-size="11px" fill="#8b90a8" font-weight="600" text-transform="uppercase" text-anchor="middle" letter-spacing="1">Event States</text>

  <path d="M 280 90 C 280 145, 160 145, 160 192" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />
  <path d="M 320 90 C 320 145, 440 145, 440 192" fill="none" stroke="#8b90a8" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)" />

  <text x="210" y="140" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="end">Successful handling</text>
  <text x="390" y="140" font-family="Inter,-apple-system,sans-serif" font-size="11px" fill="#6b7084" font-style="italic" text-anchor="start">Failed after retries</text>

  <rect x="240" y="50" width="120" height="40" rx="8" ry="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="300" y="75" font-family="&#34;SF Mono&#34;,&#34;Fira Code&#34;,Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">New</text>

  <rect x="100" y="200" width="120" height="40" rx="8" ry="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="160" y="225" font-family="&#34;SF Mono&#34;,&#34;Fira Code&#34;,Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Processed</text>

  <rect x="380" y="200" width="120" height="40" rx="8" ry="8" fill="url(#state-grad)" stroke="#bcc8da" stroke-width="1.5" />
  <text x="440" y="225" font-family="&#34;SF Mono&#34;,&#34;Fira Code&#34;,Consolas,monospace" font-size="13px" fill="#1a1a2e" text-anchor="middle">Discarded</text>
</svg>