<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4f8fd" />
            <stop offset="50%" stop-color="#eaf1fb" />
            <stop offset="100%" stop-color="#e2ebf7" />
        </linearGradient>

        <!-- State/Object Node Gradient (Blue) -->
        <linearGradient id="blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e8f0fc" />
            <stop offset="100%" stop-color="#d4e3f7" />
        </linearGradient>

        <!-- Action/Process Node Gradient (Amber) -->
        <linearGradient id="amber-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#fef9f0" />
            <stop offset="100%" stop-color="#faecd8" />
        </linearGradient>

        <!-- Arrow Marker -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 10 5 L 0 9 z" fill="#8b90a8" />
        </marker>
    </defs>

    <style>
        .code { font-family: "SF Mono", "Fira Code", Consolas, monospace; font-size: 13px; fill: #1a1a2e; }
        .label { font-family: Inter, -apple-system, sans-serif; font-size: 11px; fill: #6b7084; font-style: italic; }
        .header { font-family: Inter, sans-serif; font-size: 11px; fill: #8b90a8; font-weight: 600; text-transform: uppercase; }
    </style>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

    <!-- Subgraphs -->
    <!-- Server -->
    <rect x="40" y="50" width="220" height="270" fill="rgba(200,215,240,0.15)" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6 4" rx="8" />
    <text x="50" y="70" class="header">SERVER</text>

    <!-- Transport -->
    <rect x="290" y="50" width="280" height="270" fill="rgba(200,215,240,0.15)" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6 4" rx="8" />
    <text x="300" y="70" class="header">TRANSPORT</text>

    <!-- Client -->
    <rect x="600" y="50" width="260" height="270" fill="rgba(200,215,240,0.15)" stroke="#c0c8d4" stroke-width="1.5" stroke-dasharray="6 4" rx="8" />
    <text x="610" y="70" class="header">CLIENT</text>

    <!-- Edges (Arrows) -->
    <!-- AE to Stream -->
    <path d="M 150 140 L 150 230" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round" />
    
    <!-- Stream to Chunks -->
    <path d="M 180 230 C 180 170, 240 120, 320 120" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round" />
    
    <!-- Chunks to Consume -->
    <path d="M 540 120 C 580 120, 570 180, 620 180" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round" />
    
    <!-- Consume to Acks -->
    <path d="M 730 205 C 730 250, 600 250, 520 250" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round" />
    
    <!-- Acks to Stream -->
    <path d="M 340 250 L 240 250" stroke="#8b90a8" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-linecap="round" />

    <!-- Nodes -->
    <!-- AE (State/Object - Blue) -->
    <rect x="60" y="100" width="180" height="40" fill="url(#blue-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="150" y="125" class="code" text-anchor="middle">IAsyncEnumerable&lt;T&gt;</text>

    <!-- Stream (Action/Process - Amber) -->
    <rect x="60" y="230" width="180" height="40" fill="url(#amber-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="150" y="255" class="code" text-anchor="middle">RpcStream.New()</text>

    <!-- Chunks (State/Object - Blue) -->
    <rect x="320" y="95" width="220" height="50" fill="url(#blue-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="430" y="116" class="code" text-anchor="middle">Stream chunks</text>
    <text x="430" y="134" class="label" text-anchor="middle">via RpcMessage</text>

    <!-- Acks (State/Object - Blue) -->
    <rect x="340" y="230" width="180" height="40" fill="url(#blue-grad)" stroke="#bcc8da" stroke-width="1.5" rx="8" />
    <text x="430" y="255" class="code" text-anchor="middle">Ack messages</text>

    <!-- Consume (Action/Process - Amber) -->
    <rect x="620" y="155" width="220" height="50" fill="url(#amber-grad)" stroke="#e0cba8" stroke-width="1.5" rx="14" />
    <text x="730" y="176" class="code" text-anchor="middle">await foreach</text>
    <text x="730" y="194" class="code" text-anchor="middle">(item in stream)</text>
</svg>