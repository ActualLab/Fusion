# Deploys the docs to the Cloudflare Pages project `fusion-actuallab-net` ONLY.
# It intentionally does NOT deploy to GitHub Pages (no actions/deploy-pages, no
# `pages: write`), so the GitHub-Pages-served https://fusion.actuallab.net stays
# frozen on its last build and is unaffected by pushes to master. The Cloudflare
# deploy serves fusion-actuallab-net.pages.dev (+ any custom domain attached to
# the project, e.g. the fusion-tmp test domain) — never fusion.actuallab.net,
# unless that apex is later attached to the project on purpose.
name: Deploy Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Build Docs Project
        run: dotnet build docs/Docs.csproj -c Debug

      - name: Update snippets
        run: dotnet mdsnippets
        working-directory: docs

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build with VitePress
        run: npm run docs:build
        working-directory: docs

      - name: Test documentation MCP server
        run: npm run mcp:test
        working-directory: docs

      - name: Verify SEO (canonical / sitemap / redirects / routes)
        run: npm run docs:verify
        working-directory: docs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          workingDirectory: docs
          command: pages deploy .vitepress/dist --project-name=fusion-actuallab-net --branch=master --commit-dirty=true

      # Best-effort nudge so Bing/Yandex recrawl changed pages within minutes.
      # Runs after deploy so the freshly published key file validates; a failure
      # here never fails the deploy (the sitemap remains the source of truth).
      - name: Notify IndexNow
        run: npm run docs:indexnow
        working-directory: docs
        continue-on-error: true
